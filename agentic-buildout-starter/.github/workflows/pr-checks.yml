name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show changed files
        run: |
          echo "Repository files:"
          find . -maxdepth 4 -type f | sort

      - name: Validate n8n workflow JSON
        run: |
          if ls n8n-workflows/*.json >/dev/null 2>&1; then
            for file in n8n-workflows/*.json; do
              echo "Validating $file"
              python -m json.tool "$file" >/dev/null
            done
          else
            echo "No n8n workflow JSON files found."
          fi

      - name: Validate scripts are non-empty
        run: |
          find scripts server-scripts -type f -maxdepth 2 -print0 | while IFS= read -r -d '' file; do
            test -s "$file" || { echo "$file is empty"; exit 1; }
          done
