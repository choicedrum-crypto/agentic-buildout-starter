name: Deploy After Merge

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "Deploy logic goes here."
          echo "Codex should replace this with safe deployment steps."

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping Slack notification."
            exit 0
          fi
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Deploy finished for ${{ github.repository }} on main. Status: ${{ job.status }}. Commit: ${{ github.sha }}\"}" \
            "$SLACK_WEBHOOK_URL"
